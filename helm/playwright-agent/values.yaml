replicaCount: 1
image:
  repository: host.docker.internal:5050/playwright-agent
  tag: latest
  pullPolicy: Always

persona: default
targetUrl: http://host.docker.internal:5173
backendApi: http://host.docker.internal:5001/api/simulation/results
simApi: http://host.docker.internal:5002/api/simulation
coordApi: http://host.docker.internal:5003/api/coordinator
networkLatency: "0"
packetLoss: "0"

service:
  type: ClusterIP
  port: 80

resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "500m"

# Job-specific settings
completions: 100
parallelism: 20
shardTotal: 10
workersPerPod: 10
backoffLimit: 2
ttlSecondsAfterFinished: 3600
commandOverride: ""
probeMode: "transactional"
# URL for the basic ping probe (PROBE_MODE=basic). Leave empty to use TARGET_URL.
probeUrl: ""
# Transactional mode: number of rounds each agent runs before exiting
agentRounds: 3
# Transactional mode: seconds to sleep between rounds (re-login happens before each)
roundSleep: 30

statefulset:
  enabled: false

sharedCache:
  enabled: false
  accessMode: ReadWriteOnce
  size: 2Gi
  storageClassName: ""

persistence:
  enabled: false
  accessMode: ReadWriteOnce
  size: 10Gi
  storageClassName: ""

resourceQuota:
  enabled: false
  hard: {}

pdb:
  enabled: true
  minAvailable: 1

kueue:
  enabled: false
  queueName: simulation-queue
