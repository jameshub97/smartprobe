events {}
http {
    upstream backend_servers {
        server backend1:5001;
        server backend2:5001;
    }

    server {
        listen 80;

        # Backend API (load balanced)
        location /api/ {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Simulation service API
        location /api/simulation/ {
            proxy_pass http://simulation:5002/api/simulation/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Cleanup API (simulation service)
        location /api/cleanup/ {
            proxy_pass http://simulation:5002/api/cleanup/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Coordinator API
        location /api/coordinator/ {
            proxy_pass http://coordinator:5003/api/coordinator/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Simulation dashboard + favicon
        location /dashboard {
            proxy_pass http://simulation:5002/dashboard;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /favicon.svg {
            proxy_pass http://simulation:5002/favicon.svg;
        }

        location /favicon.ico {
            proxy_pass http://simulation:5002/favicon.ico;
        }

        # Default: proxy to backend
        location / {
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
