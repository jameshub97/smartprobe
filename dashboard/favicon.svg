<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- outer ring -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="white" stroke-width="2" opacity="0.9"/>
  <!-- middle ring -->
  <circle cx="16" cy="16" r="8.5" fill="none" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <!-- inner ring -->
  <circle cx="16" cy="16" r="4" fill="none" stroke="white" stroke-width="1.5" opacity="0.55"/>
  <!-- crosshair lines -->
  <line x1="16" y1="1" x2="16" y2="10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="22" x2="16" y2="31" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="1" y1="16" x2="10" y2="16" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22" y1="16" x2="31" y2="16" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- centre dot -->
  <circle cx="16" cy="16" r="2" fill="#ede9fe"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" style="background:#2e1065">
  <rect width="32" height="32" fill="#2e1065"/>
  <!-- magnifying glass circle -->
  <circle cx="13" cy="13" r="7" fill="none" stroke="#a78bfa" stroke-width="2.5"/>
  <!-- inner lens tint -->
  <circle cx="13" cy="13" r="5.5" fill="#4c1d95" opacity="0.6"/>
  <!-- lens glint -->
  <circle cx="10.5" cy="10.5" r="1.5" fill="#ddd6fe" opacity="0.5"/>
  <!-- handle -->
  <line x1="18.5" y1="18.5" x2="26" y2="26" stroke="#7c3aed" stroke-width="3" stroke-linecap="round"/>
  <!-- crosshair inside lens -->
  <line x1="13" y1="9" x2="13" y2="17" stroke="#c4b5fd" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <line x1="9" y1="13" x2="17" y2="13" stroke="#c4b5fd" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  <circle cx="13" cy="13" r="1.2" fill="#ede9fe"/>
</svg>
