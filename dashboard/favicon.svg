<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- background -->
  <rect width="32" height="32" rx="6" fill="#0f172a"/>
  <!-- outer radar ring -->
  <circle cx="16" cy="16" r="12" fill="none" stroke="#3b82f6" stroke-width="1.2" opacity="0.35"/>
  <!-- mid radar ring -->
  <circle cx="16" cy="16" r="8" fill="none" stroke="#3b82f6" stroke-width="1.3" opacity="0.55"/>
  <!-- inner radar ring -->
  <circle cx="16" cy="16" r="4" fill="none" stroke="#60a5fa" stroke-width="1.3" opacity="0.8"/>
  <!-- sweep sector (radar cone) -->
  <path d="M16 16 L26.4 9.6 A12 12 0 0 0 16 4 Z" fill="#3b82f6" opacity="0.12"/>
  <!-- sweep leading edge -->
  <line x1="16" y1="16" x2="26.4" y2="9.6" stroke="#93c5fd" stroke-width="1.5" stroke-linecap="round" opacity="0.75"/>
  <!-- crosshair ticks -->
  <line x1="16" y1="3"  x2="16" y2="7"  stroke="#60a5fa" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="16" y1="25" x2="16" y2="29" stroke="#60a5fa" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="3"  y1="16" x2="7"  y2="16" stroke="#60a5fa" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="25" y1="16" x2="29" y2="16" stroke="#60a5fa" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <!-- detected blip -->
  <circle cx="23" cy="10" r="1.6" fill="#38bdf8" opacity="0.9"/>
  <!-- center dot -->
  <circle cx="16" cy="16" r="2.2" fill="#bfdbfe"/>
  <circle cx="16" cy="16" r="1"   fill="#e0f2fe"/>
</svg>
