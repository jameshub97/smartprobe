apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
      - name: wait-for-migrations
        image: bitnami/kubectl:latest
        command: ["kubectl", "wait", "job/db-migrate", "--for=condition=complete", "--timeout=300s"]
      containers:
      - name: backend
        image: backend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5001
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: POSTGRES_PASSWORD
        - name: ConnectionStrings__DefaultConnection
          value: "Host=postgres;Database=transferstacker;Username=postgres;Password=$(POSTGRES_PASSWORD)"
        - name: ASPNETCORE_URLS
          value: "http://+:5001"
        readinessProbe:
          httpGet:
            path: /health
            port: 5001
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
