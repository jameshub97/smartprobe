apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
type: Opaque
stringData:
  POSTGRES_DB: TransferStackerDb
  POSTGRES_USER: postgres
  # IMPORTANT: Replace this with a strong password before deploying to production.
  # Generate one with: openssl rand -base64 32
  POSTGRES_PASSWORD: postgres
---
apiVersion: v1
kind: Secret
metadata:
  name: simulation-secret
type: Opaque
stringData:
  # IMPORTANT: Replace this with a strong key before deploying to production.
  # Generate one with: openssl rand -base64 32
  SIMULATION_API_KEY: dev-key-change-in-production
